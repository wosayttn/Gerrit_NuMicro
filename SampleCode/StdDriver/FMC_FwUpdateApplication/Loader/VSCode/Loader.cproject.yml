project:
  packs:
    - pack: Nuvoton::NuMicroM23_DFP
  misc:
    - for-compiler: AC6
      C: [-std=c99, -fno-rtti, -funsigned-char, -fshort-enums, -fshort-wchar, -ffunction-sections, -fdata-sections, -D__MICROLIB, -o0, -gdwarf-4, -fno-inline]
      ASM: [-D__MICROLIB]
      Link: [--library_type=microlib, --map, --load_addr_map_info, --symbols, --info sizes, --info totals, --entry Reset_Handler, --summary_stderr, --info summarysizes, --diag_suppress=6314]
    - for-compiler: GCC
      C: [-std=gnu11, --specs=nano.specs, -Wno-return-type, -Wno-unused-but-set-variable, -fdata-sections, -ffunction-sections, -fno-builtin, -fshort-enums, -funsigned-char, -mthumb, -Wno-main, -gdwarf-4]
      Link:
        - -Xlinker
        - --gc-sections
        - --specs=nano.specs
        - -Wl,-Map,"$OutDir()$/$Project$.map"

  setups:
    - output:
        type: ["elf", "bin"]
  linker:
    - for-compiler: AC6
      script: ./Loader.sct
    - for-compiler: GCC
      script: ./Loader.ld
  add-path:
    - ../../../../../Library/Device/Nuvoton/M2003J/Include
    - ../../../../../Library/StdDriver/inc
    - ../../../../../Library/CMSIS/Core/Include
    - ../../common/inc
    - ../../../../../Library/NuMaker/common
  groups:
    - group: CMSIS
      files:
        - file: ../../../../../Library/Device/Nuvoton/M2003J/Source/system_M2003J.c
        - file: ../../../../../Library/Device/Nuvoton/M2003J/Source/ARM/startup_M2003J.c
          for-compiler: AC6
        - file: ../../../../../Library/Device/Nuvoton/M2003J/Source/GCC/startup_M2003J.S
          for-compiler: GCC
    - group: Library
      files:
        - file: ../../../../../Library/StdDriver/src/clk.c
        - file: ../../../../../Library/StdDriver/src/sys.c
        - file: ../../../../../Library/StdDriver/src/uart.c
        - file: ../../../../../Library/StdDriver/src/retarget.c
        - file: ../../../../../Library/StdDriver/src/fmc.c
        - file: ../../../../../Library/NuMaker/common/xmodem.c
    - group: User
      files:
        - file: ../main.c

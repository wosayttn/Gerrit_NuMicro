project:
  linker:
    - script: ./scatter.scf
      for-compiler: AC6
#    - script: ./scatter.ld
#      for-compiler: GCC

  packs:
    - pack: Nuvoton::NuMicroM23_DFP@^1.0.4

  setups:
    - setup: Common
      add-path:
        - ../../../../Library/CMSIS/Core/Include
        - ../../../../Library/StdDriver/inc
        - ../../../../Library/Device/Nuvoton/M2003/Include
        - ../../../../Library/Device/Nuvoton/NPD48/Include
        - ../../../../Library/PowerDeliveryLib/Include
        - ../../../../Library/PowerDeliveryLib/Include/Inc
      debug: "off"
      define:
        - CONFIG_OB_SOLUTION: "1"
        - OPT_FPGA: "0"
        - DEBUG_PORT: UART0
        - OPT_CAPTIVE_CABLE: "1"
        - OPT_M2003: "1"
        - NPD48_ALERT: GPB_IRQn
        - OPT_SRC_ONLY: "1"
        - OPT_SNK_ONLY: "0"
        - NPD48_FPGA: "0"
        - CONFIG_USB_PD_TCPC_RUNTIME_CONFIG
        - CHROMIUM_EC: "1"
        - CONFIG_USB_PD_FRS_TCPC: "0"
        - CONFIG_USB_PD_REV30: "1"
        - CONFIG_TC8260_FRS: "0"

    - setup: ARMCLANG
      for-compiler: AC6
      define:
        - __MICROLIB
      define-asm:
        - __MICROLIB
      misc:
        - C:
            - -std=c99
            - -Oz
          C-CPP:
            - -flto
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -fdata-sections
            - -w
          CPP:
            - -xc++
            - -std=c++98
            - -fno-exceptions
            - -fno-rtti
          ASM:
            - -masm=auto
            - -Wno-unused-command-line-argument
            - -Wa,--diag_suppress=A1950W
          Link:
            - --library_type=microlib
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --lto
            - --datacompressor=off
            - --entry Reset_Handler
            - --strict
            - --summary_stderr
            - --info summarysizes
            - --remove

#    - setup: GCC
#      for-compiler: GCC
#      misc:

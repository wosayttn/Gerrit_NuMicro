  groups:
    - group: CMSIS
      files:
        - file: ../../../../Library/Device/Nuvoton/M2003/Source/system_M2003.c
        - file: ./startup_M2003_PD.s
#          for-compiler: AC6
#        - file: ../../../../Library/Device/Nuvoton/M2003/Source/GCC/startup_M2003.S
#          for-compiler: GCC

    - group: Library
      files:
        - file: ../../../../Library/StdDriver/src/retarget.c
        - file: ../../../../Library/StdDriver/src/uart.c
        - file: ../../../../Library/StdDriver/src/clk.c
        - file: ../../../../Library/StdDriver/src/sys.c
        - file: ../../../../Library/StdDriver/src/timer.c
        - file: ../../../../Library/StdDriver/src/gpio.c
        - file: ../../../../Library/StdDriver/src/i2c.c

    - group: NPD48_Driver
      files:
        - file: ../../../../Library/Device/Nuvoton/NPD48/src/i2c_interrupt.c
        - file: ../../../../Library/Device/Nuvoton/NPD48/src/utcpd.c

    - group: User
      files:
        - file: ../main.c
        - file: ../usb_pd_policy.c
        - file: ../commandshell.c
        - file: ../NPD48_ADC.c
        - file: ../NPD48_Protection.c
        - file: ../NPD48_VINGATE2_CTRL.c
        - file: ../NPD48_VBUS_DrawnCurrent_Compensation.c
        - file: ../NPD48_InterConnection.c
        - file: ../usb_pd_falling_transition.c
        - file: ../NPD48_ChipInit.c

    - group: Lib
      files:
        - file: ../../../../Library/PowerDeliveryLib/PD_SRC.lib
          for-compiler: AC6
#        - file: ../../../../Library/PowerDeliveryLib/libPD_SRC.a
#          for-compiler: GCC
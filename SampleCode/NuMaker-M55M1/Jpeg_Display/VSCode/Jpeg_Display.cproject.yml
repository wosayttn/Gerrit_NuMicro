project:
  packs:
    - pack: Nuvoton::NuMicroM55_DFP
  setups:
    - output:
        # bin, elf, hex, lib
        type: bin
    - setup: Options for Jpeg_Display
      processor:
        fpu: dp
        mve: fp
        endian: little
        trustzone: "off"
      add-path:
        - ../../../../Library/CMSIS/Core/Include
        - ../../../../Library/CMSIS/DSP/Include
        - ../../../../Library/Device/Nuvoton/M55M1/Include
        - ../../../../Library/StdDriver/inc
        - ../../../../Library/Storage
        - ../../../../ThirdParty/FatFs/source
        - ../../../../Library/JpegAcceleratorLib/include
        - ../../../../ThirdParty/libjpeg
        - ../../../../ThirdParty/openmv/omv/imlib
        - ../../../../ThirdParty/openmv/omv/alloc
        - ../../../../ThirdParty/openmv/omv/common
        - ../../../../ThirdParty/openmv/omv/Lib
        - ../../../../ThirdParty/openmv/omv
        - ../Device/Display
        - ../Device/include
        - ..
      define:
        - WITH_JPEGACC
        - TEST_GRAYSCALE: "0"
      misc:
        - for-compiler: AC6
          C:
            - -std=c11
          C-CPP:
            - -fno-exceptions -fno-rtti -funsigned-char -fshort-enums -fshort-wchar -ffunction-sections -fdata-sections -Wall
            - -Wno-char-subscripts
          CPP:
            - -xc++
            - -std=c++11
          ASM:
            - -masm=auto
          Link:
            - --map --load_addr_map_info --xref --callgraph --symbols
            - --info sizes --info totals --info unused --info veneers
            - --strict --summary_stderr --info summarysizes
            - --diag_suppress 6314
        - for-compiler: GCC
          C:
            - -std=gnu11
          C-CPP:
            - -mthumb -masm-syntax-unified -fmessage-length=0 -fsigned-char -ffunction-sections -fdata-sections
          CPP:
            - -std=c++14
            - -Wno-subobject-linkage
          Link:
            - -mthumb -fmessage-length=0 -fsigned-char --specs=nano.specs --specs=nosys.specs
            - -Wl,--gc-sections,-Map="$elf()$.map"
            - -Wl,--no-warn-rwx-segments
            #- -L"../../../../Library/JpegAcceleratorLib"
            #- -L"../../../../ThirdParty/openmv/omv/Lib"
            #- -L"../../../../Library/CryptoAccelerator/lib"
          #Library:
          #  - -lJpegAccelerator
          #  - -lomv

  linker:
    - script: ../Keil/M55M1.scf
      for-compiler: AC6
    - script: ../GCC/M55M1.ld
      for-compiler: GCC
  groups:
    - group: CMSIS
      files:
        - file: ../../../../Library/Device/Nuvoton/M55M1/Source/startup_M55M1.c
        - file: ../../../../Library/Device/Nuvoton/M55M1/Source/system_M55M1.c
        - file: ../../../../Library/Device/Nuvoton/M55M1/Source/GCC/_syscalls.c
          for-compiler: GCC

    - group: Device
      files:
        - file: ../Device/Display/Display.c
        - file: ../Device/Display/drv_pdma.c
        - file: ../Device/Display/Font8_16.c
        - file: ../Device/Display/LCD/LCD_LT7381.c
    
    - group: FATFS
      files:
        - file: ../../../../ThirdParty/FatFs/source/ff.c        

    - group: libjpeg
    

project:
  packs:
    - pack: Nuvoton::NuMicroM23_DFP
  setups:
    - output:
        type: bin
    - setup: Options for FreeRun
      for-context: .FreeRun
      output:
        base-name: NuMaker_M2L31TK_FreeRun
        type: bin
      add-path:
        - ../../../../Library/Device/Nuvoton/M2L31/Include
        - ../../../../Library/StdDriver/inc
        - ../../../../Library/TKLib/Include
        - ../../../../Library/CMSIS/Core/Include
        - ../../../../Library/LCDLib/Include
      debug: on
      define:
        - DEMO_FREERUN
        - DEBUG_PORT: UART3
      misc:
        - for-compiler: AC6
          C:
            - -std=c11 -fno-rtti 
              -ffunction-sections -fdata-sections -Wall
              -Wno-sometimes-uninitialized
              -Wno-tautological-bitwise-compare
              -funsigned-char -fshort-enums -fshort-wchar
            - -D__MICROLIB
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib --map --load_addr_map_info --symbols
            - --info sizes --info totals --strict --summary_stderr --info
              summarysizes
 
        - for-compiler: GCC
          C:
            - -std=gnu11 -mthumb -masm-syntax-unified -fmessage-length=0
              -ffunction-sections -fdata-sections
              -funsigned-char -fshort-enums -fshort-wchar
          Link:
            - -mthumb -fmessage-length=0 -funsigned-char -fshort-enums -fshort-wchar
              --specs=nano.specs
              --specs=nosys.specs
            - -Wl,--gc-sections,-Map="$elf()$.map"
            - -Wl,--no-warn-rwx-segments
            - -Wl,--no-wchar-size-warning
        
    - setup: Options for Calibration
      for-context: .Calibration
      output:
        base-name: NuMaker_M2L31TK_Calibration
        type: bin
      add-path:
        - ../../../../Library/Device/Nuvoton/M2L31/Include
        - ../../../../Library/StdDriver/inc
        - ../../../../Library/TKLib/Include
        - ../../../../Library/CMSIS/Core/Include
        - ../../../../Library/LCDLib/Include
      debug: on
      define:
        - DEMO_CALIBRATION
        - DEBUG_PORT: UART3
      misc:
        - for-compiler: AC6
          C:
            - -std=c11 -fno-rtti 
              -ffunction-sections -fdata-sections -Wall
              -Wno-sometimes-uninitialized
              -Wno-tautological-bitwise-compare
              -funsigned-char -fshort-enums -fshort-wchar
            - -D__MICROLIB
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib --map --load_addr_map_info --symbols
            - --info sizes --info totals --strict --summary_stderr --info
              summarysizes
        - for-compiler: GCC
          C:
            - -std=gnu11 -mthumb -masm-syntax-unified -fmessage-length=0
              -ffunction-sections -fdata-sections
              -funsigned-char -fshort-enums -fshort-wchar
          Link:
            - -mthumb -fmessage-length=0 -funsigned-char -fshort-enums -fshort-wchar
              --specs=nano.specs  
              --specs=nosys.specs
            - -Wl,--gc-sections,-Map="$elf()$.map"
            - -Wl,--no-warn-rwx-segments 
            - -Wl,--no-wchar-size-warning
 
            
  linker:
    - script: TK_FreeRun.sct
      for-context: .FreeRun
      for-compiler: AC6
    - script: TK_Calibration.sct
      for-context: .Calibration
      for-compiler: AC6
    - script: gcc_arm.ld
      for-context: .FreeRun
      for-compiler: GCC
    - script: gcc_arm.ld
      for-context: .Calibration
      for-compiler: GCC
  groups:
    - group: Startup
      files:
        - file: ../../../../Library/Device/Nuvoton/M2L31/Source/ARM/startup_M2L31.c
          for-compiler: AC6
        - file: ../../../../Library/Device/Nuvoton/M2L31/Source/GCC/startup_M2L31.S
          for-compiler: GCC
        - file: ../../../../Library/Device/Nuvoton/M2L31/Source/GCC/_syscalls.c
          for-compiler: GCC
        - file: ../../../../Library/Device/Nuvoton/M2L31/Source/system_M2L31.c
    - group: Library
      for-context: .FreeRun
      files:
        - file: ../../../../Library/TKLib/TKLib_FreeRun.lib
          for-compiler: AC6
        - file: ../../../../Library/TKLib/libTKLib_FreeRun.a
          for-compiler: GCC
    - group: Source
      for-context: .FreeRun
      files:
        - file: ../TK_DebugUART.c
        - file: ../TK_Main.c
        - file: ../TK_MultPinFunctions.c
        - file: ../TK_SysTick.c
    - group: Driver
      files:
        - file: ../../../../Library/StdDriver/src/uart.c
        - file: ../../../../Library/StdDriver/src/timer.c
        - file: ../../../../Library/StdDriver/src/clk.c
        - file: ../../../../Library/StdDriver/src/sys.c
        - file: ../../../../Library/StdDriver/src/retarget.c
        - file: ../../../../Library/StdDriver/src/gpio.c
        - file: ../../../../Library/StdDriver/src/tk.c
        - file: ../../../../Library/StdDriver/src/rmc.c
    - group: Inc
      for-context: .FreeRun
      files:
        - file: ../TK_Data.c
    - group: Library
      for-context: .Calibration
      files:
        - file: ../../../../Library/TKLib/TKLib_Calibration.lib
          for-compiler: AC6
        - file: ../../../../Library/TKLib/libTKLib_Calibration.a
          for-compiler: GCC
    - group: Source
      for-context: .Calibration
      files:
        - file: ../TK_DebugUART.c
        - file: ../TK_Main.c
        - file: ../TK_MultPinFunctions.c
        - file: ../TK_SysTick.c
        - file: ../TK_UartCmd.c
        - file: ../TK_MassProduction.c

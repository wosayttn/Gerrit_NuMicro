project:
  packs:
    - pack: Nuvoton::NuMicroM33_DFP@^1.0.3
  setups:
    - setup: Options for emWin_SimpleDemo
      processor:
        fpu: sp
      add-path:
        - ../../../../Library/CMSIS/Core/Include
        - ../../../../Library/Device/Nuvoton/m3331/Include
        - ../../../../Library/StdDriver/inc
        - ../../../../ThirdParty/emWin_light/Config
        - ../../../../ThirdParty/emWin_light/Include
      debug: "on"
      define:
        - __DEMO_320x240__
        - __MICROLIB
      define-asm:
        - __MICROLIB
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
            - -Wconditional-uninitialized
            - -mno-unaligned-access
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --map --datacompressor=off --info=inline --entry Reset_Handler
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: ../../../../Library/Device/Nuvoton/m3331/Config/m3331_ac6.sct
  groups:
    - group: CMSIS
      files:
        - file: ../../../../Library/Device/Nuvoton/m3331/Source/system_m3331.c
        - file: ../../../../Library/Device/Nuvoton/m3331/Source/startup_m3331.c
    - group: User
      files:
        - file: ../main.c
    - group: Library
      files:
        - file: ../../../../Library/StdDriver/src/clk.c
        - file: ../../../../Library/StdDriver/src/fmc.c
        - file: ../../../../Library/StdDriver/src/retarget.c
        - file: ../../../../Library/StdDriver/src/sys.c
        - file: ../../../../Library/StdDriver/src/timer.c
        - file: ../../../../Library/StdDriver/src/uart.c
    - group: Application
      files:
        - file: ../Application/DecodeGIF.c
    - group: emWin_config
      files:
        - file: ../../../../ThirdParty/emWin_light/Config/GUI_X.c
        - file: ../../../../ThirdParty/emWin_light/Config/GUIConf2.c
        - file: ../../../../ThirdParty/emWin_light/Config/LCDConf2.c
    - group: emWin_lib
      files:
        - file: ../../../../ThirdParty/emWin_light/Lib/NUemWin_CM33_Keil.lib
    - group: lcd
      files:
        - file: ../../../../Library/StdDriver/src/spi.c
        - file: ../../../../Library/StdDriver/src/gpio.c
        - file: ../Application/lcd/ILI9341.c
        - file: ../Application/lcd/lcm.h

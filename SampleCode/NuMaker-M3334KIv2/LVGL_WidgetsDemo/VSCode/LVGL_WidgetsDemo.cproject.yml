project:
  packs:
    - pack: Nuvoton::NuMicroM33_DFP@^1.0.3
  setups:
    - setup: Options for LVGL_WidgetsDemo
      processor:
        fpu: sp
        endian: little
        trustzone: non-secure
      add-path:
        - ..
        - ../../../../Library/CMSIS/Core/Include
        - ../../../../Library/Device/Nuvoton/m3331/Include
        - ../../../../Library/StdDriver/inc
        - ../../../../ThirdParty/FreeRTOS/portable/GCC/ARM_CM33/non_secure
        - ../../../../ThirdParty/FreeRTOS/include
        - ../common
        - ../common/drv_disp
        - ../common/drv_indev
        - ../lv_port
        - ../../../../ThirdParty/lvgl/src
        - ../../../../ThirdParty/lvgl/src/core
        - ../../../../ThirdParty/lvgl/src/draw
        - ../../../../ThirdParty/lvgl/src/draw/sw
        - ../../../../ThirdParty/lvgl/src/font
        - ../../../../ThirdParty/lvgl/src/misc
        - ../../../../ThirdParty/lvgl/src/widgets
        - ../../../../ThirdParty/lvgl/demos
        - ../../../../ThirdParty/lvgl/demos/benchmark
        - ../../../../ThirdParty/lvgl/demos/music
        - ../../../../ThirdParty/lvgl/demos/stress
        - ../../../../ThirdParty/lvgl/demos/widgets
        - ../../../../ThirdParty/lvgl/demos/music/assets
        - ../../../../ThirdParty/lvgl/demos/keypad_encoder
        - ../../..
        - ../sls_files
      debug: "on"
      define:
        - __320x240__
        - CPU_CORTEX_M33
        - LV_CONF_INCLUDE_SIMPLE
        - NUFUN: "1"
        - M3334KI
        - __MICROLIB
      define-asm:
        - M3334KI
        - __MICROLIB
      misc:
        - C:
            - -std=c11
          C-CPP:
            - -flto
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
            - -Wconditional-uninitialized
            - -mno-unaligned-access
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib
            - --map
            - --load_addr_map_info
            - --info sizes
            - --info totals
            - --info veneers
            - --lto
            - --map --datacompressor=off --info=inline --entry Reset_Handler
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: ../../../../Library/Device/Nuvoton/m3331/Config/m3331_ac6.sct
  groups:
    - group: src
      files:
        - file: ../main.c
          misc:
            - C-CPP:
                - -w
              CPP:
                - -xc++
        - file: ../task_lv.c
        - file: ../FreeRTOSConfig.h
    - group: Library
      files:
        - file: ../../../../Library/StdDriver/src/clk.c
        - file: ../../../../Library/StdDriver/src/gpio.c
        - file: ../../../../Library/StdDriver/src/pdma.c
        - file: ../../../../Library/StdDriver/src/retarget.c

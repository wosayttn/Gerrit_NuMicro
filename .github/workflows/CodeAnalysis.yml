name: CodeAnalysis

on:
  push:
    branches-ignore:
      - main
      - master
  workflow_dispatch:

jobs:
  CodeAnalysis:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Code analysis
        shell: bash
        run: |
          CODE_ANALYSIS="D:/code-analysis"

          set +e -x

          cd "$CODE_ANALYSIS"
          pip install -r requirements.txt
          python code-analysis.py $GITHUB_WORKSPACE > /dev/null 2>&1
          
          cd $GITHUB_WORKSPACE
          found_report=0
          # Check both the workspace and the code analysis directory just in case
          for file in "$GITHUB_WORKSPACE"/code-analysis-report*.zip "$CODE_ANALYSIS"/code-analysis-report*.zip; do
            if [[ -f "$file" ]]; then
              # Write the absolute path directly to attachments.txt
              echo "$file" >> "$GITHUB_WORKSPACE/attachments.txt"
              found_report=1
            fi
          done
          
          if [[ $found_report -eq 1 ]]; then
            exit 1
          fi

      - name: Send mail
        if: failure()
        uses: ./.github/actions/send-mail
        with:
          mail-connection: ${{ secrets.MAIL_CONNECTION }}
          mail-to-ms10: ${{ secrets.MAIL_TO }}
          mail-to-ms20: ${{ secrets.MAIL_TO }}
          mail-to-ms40: ${{ secrets.MAIL_TO }}
          mail-to-ms70: ${{ secrets.MAIL_TO_MS70 }}
          default-mail-to: ${{ secrets.MAIL_TO }}
          workflow-name: ${{ github.workflow }}
          ref-name: ${{ github.ref_name }}

